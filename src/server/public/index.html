<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>freemarker-preview</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/shell.css">
</head>
<body>
<header class="shell-header">
  <div class="shell-title">freemarker-preview</div>
  <div class="shell-fixtures" id="fixtures" role="tablist" aria-label="fixtures"></div>
  <div class="shell-controls">
    <div class="width-controls" role="group" aria-label="preview width">
      <button type="button" class="width-btn" data-width="375" title="Mobile (375px)">375</button>
      <button type="button" class="width-btn" data-width="600" title="Desktop (600px)">600</button>
      <button type="button" class="width-btn" data-width="full" title="Full container width">Full</button>
      <input type="number" class="width-custom" id="width-custom" min="200" max="2000" placeholder="px" aria-label="custom width">
    </div>
    <button type="button" class="dark-toggle" id="dark-toggle" aria-pressed="false" title="dark mode">
      <span class="dark-icon" aria-hidden="true">◐</span>
      <span class="dark-label">dark</span>
    </button>
  </div>
  <div class="shell-status" id="status" data-state="idle" title="idle">
    <span class="dot"></span>
    <span class="label" id="status-label">idle</span>
  </div>
</header>
<div class="shell-body">
  <aside class="shell-sidebar" aria-label="templates">
    <div class="sidebar-section-label">templates</div>
    <ul class="template-list" id="templates"></ul>
  </aside>
  <main class="shell-main">
    <div class="iframe-wrap" id="iframe-wrap" data-mode="plain">
      <div class="preview-phone">
        <div class="mockup-phone">
          <div class="mockup-phone-camera"></div>
          <div class="mockup-phone-display" id="phone-display"></div>
        </div>
      </div>
      <div class="preview-plain" id="preview-plain">
        <iframe id="preview" title="email preview"></iframe>
      </div>
      <div class="overlay" id="overlay" hidden>
        <div class="overlay-card">
          <button type="button" class="overlay-dismiss" id="overlay-dismiss" title="dismiss (reveals previous render)">&times;</button>
          <div class="overlay-header">
            <span class="overlay-type" id="overlay-type"></span>
            <span class="overlay-location" id="overlay-location"></span>
          </div>
          <div class="overlay-message" id="overlay-message"></div>
          <pre class="overlay-snippet" id="overlay-snippet"></pre>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="/shell.js"></script>
</body>
</html>
